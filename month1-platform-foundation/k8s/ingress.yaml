apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-app
  namespace: default
  labels:
    app: fastapi-app
  annotations:
    # ingressClassName can also be set here as an annotation (older clusters),
    # but the spec.ingressClassName field below is the modern way (Kubernetes 1.18+).

    # nginx-specific: enable HTTPS redirect. Any HTTP request is 308-redirected to HTTPS.
    # Remove this annotation if you don't have TLS configured.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"

    # nginx-specific: rewrite the request path before sending to the backend.
    # Example: if the app expects requests at "/" but is exposed at "/api" in the Ingress,
    # use rewrite-target: / to strip the prefix.
    # nginx.ingress.kubernetes.io/rewrite-target: /

    # nginx-specific: custom proxy timeouts (override nginx defaults of 60s)
    # Increase proxy-read-timeout if the app has long-running requests to prevent 504s.
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"

spec:
  # ingressClassName connects this Ingress resource to a specific Ingress controller.
  # If you have multiple controllers (nginx + Traefik), only the correct one picks this up.
  # Find available classes with: kubectl get ingressclass
  ingressClassName: nginx

  # TLS block: if present, nginx terminates TLS and serves HTTP to the backend.
  # The Secret must contain `tls.crt` and `tls.key`.
  # Comment this out if running locally without TLS.
  # tls:
  #   - hosts:
  #       - fastapi-app.local
  #     secretName: fastapi-app-tls

  rules:
    # host: nginx uses the HTTP Host header to match this rule.
    # If the request's Host header doesn't match ANY host in any Ingress rule,
    # nginx returns 404 (no matching server block) — NOT a 502 or 503.
    # This is the exact bug from the Copart incident (2026-03-27).
    - host: fastapi-app.local
      http:
        paths:
          # Exact path matching — only /health matches, not /health/ or /health/check
          - path: /health
            pathType: Exact
            backend:
              service:
                name: fastapi-app
                port:
                  number: 80

          # Exact path matching for readiness endpoint
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: fastapi-app
                port:
                  number: 80

          # Prefix path matching — matches /, /anything, /anything/else
          # In nginx.conf, longer Prefix matches take precedence over shorter ones.
          # Exact matches ALWAYS take precedence over Prefix matches.
          # So /health (Exact) above wins over / (Prefix) for requests to /health.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fastapi-app
                port:
                  number: 80

# --- HOW NGINX PROCESSES THESE RULES ---
#
# The nginx Ingress controller merges ALL Ingress resources across ALL namespaces
# into a single nginx.conf. For this Ingress, it generates roughly:
#
#   server {
#       listen 80;
#       server_name fastapi-app.local;
#
#       location = /health {
#           proxy_pass http://fastapi-app-upstream;
#       }
#       location = /ready {
#           proxy_pass http://fastapi-app-upstream;
#       }
#       location / {
#           proxy_pass http://fastapi-app-upstream;
#       }
#   }
#
# nginx location matching precedence (high to low):
#   1. `location = /exact` (exact match)
#   2. `location ^~ /prefix` (preferential prefix match, stops further checking)
#   3. `location ~ regex` (case-sensitive regex)
#   4. `location ~* regex` (case-insensitive regex)
#   5. `location /prefix` (longest prefix wins; checked after regex)
#
# pathType: Exact  → generates `location = /path`
# pathType: Prefix → generates `location /path` (longest prefix wins)
#
# DEBUGGING TIP: Verify generated nginx config with:
#   kubectl exec -n ingress-nginx <nginx-pod> -- cat /etc/nginx/nginx.conf | grep -A 10 "server_name fastapi"
